apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platformengineering
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/roko1987-k8s/test-platform-engineering.git
    targetRevision: HEAD
    path: platformengineering

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
